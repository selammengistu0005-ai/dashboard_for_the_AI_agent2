<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Analytics | Data Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div id="key-overlay" class="overlay">
        <div class="login-box">
            <div class="lock-shield"><i class="fa-solid fa-shield-halved"></i></div>
            <h2>Secure Access</h2>
            <p>Enter your agent's unique access key.</p>
            <div class="password-wrapper">
                <input type="password" id="agent-key-input" placeholder="Enter Access Key...">
                <i id="toggle-password-eye" class="fa-solid fa-eye"></i>
            </div>
            <button id="unlock-btn">Authorize Dashboard</button>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div class="app-container" id="main-app" style="display: none;">
        
        <aside class="sidebar">
            <div class="logo" id="logo-refresh" title="Refresh Dashboard">
                <div class="logo-icon"><i class="fa-solid fa-robot"></i></div>
                <span>AI <span>Data-base</span></span>
            </div>

            <div class="sidebar-chart-container">
                <div class="card chart-card sidebar-card">
                    <canvas id="intentChart"></canvas>
                </div>
                <button id="scroll-to-kb" class="sidebar-action-btn">
                    <i class="fa-solid fa-pen-to-square"></i> Edit Knowledge database
                </button>
                <button id="open-history-btn" class="sidebar-action-btn secondary-action">
                    <i class="fa-solid fa-clock-rotate-left"></i>History
                </button>
                <button id="export-logs-btn" class="sidebar-action-btn secondary-action">
                    <i class="fa-solid fa-file-export"></i> Export Conversations (CSV)
                </button>
            </div>

            <div class="theme-section">
                <div class="toggle-container" id="mode-switch">
                    <div class="toggle-track">
                        <div class="toggle-knob">
                            <i class="fa-solid fa-moon moon-icon"></i>
                            <i class="fa-solid fa-sun sun-icon"></i>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="live-monitor-view">
    <header class="dashboard-header">
        <div class="header-text">
            <h1>Live</h1>
            <div class="live-indicator">
                <span class="pulse-dot"></span>
                <span>Connected to your agent</span>
            </div>
        </div>
    </header>

    <div class="logs-wrapper">
        <div id="logs" class="logs-flex-container"></div>
    </div>
            </div>
            <div id="editor-view-container">
    
    <section id="knowledge-base-section">
        <div class="kb-container">
            <div class="kb-header">
                <h3><i class="fa-solid fa-brain"></i> Agent Personality</h3>
                <p>Configure how your AI thinks and speaks.</p>
            </div>
            
            <label class="field-label">AI Display Name</label>
            <input type="text" id="ai-name-input" class="persona-input" placeholder="e.g. Lumi2">

            <label class="field-label">Instructions</label>
            <textarea id="ai-instructions" placeholder="Enter master system instructions..."></textarea>

            <label class="field-label">Persona</label>
            <div class="persona-matrix">
                <button class="persona-btn" data-style="Professional">Professional</button>
                <button class="persona-btn" data-style="Friendly">Friendly</button>
                <button class="persona-btn" data-style="Witty">Witty</button>
                <button class="persona-btn" data-style="Aggressive">Aggressive</button>
                <button class="persona-btn" data-style="Empathy">Empathy</button>
                <button class="persona-btn" data-style="Adaptable">Adaptable</button>
                <button class="persona-btn" data-style="Curious">Curious</button>
                <button class="persona-btn" data-style="Confident">Confident</button>
                <button class="persona-btn" data-style="Patient">Patient</button>
                <button class="persona-btn" data-style="Consistent">Consistent</button>
            </div>

            <div class="kb-form-actions" style="margin-top: 20px;">
                <button id="add-kb-item" class="save-all-btn" onclick="saveKnowledge()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Commit Changes
                </button>
            </div>
        </div>
    </section>
</div>
    </main>
</div> 
    <div id="history-drawer" class="history-drawer">
    <div class="drawer-header">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Instruction History</h3>
        <button id="close-history-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="drawer-content">
        <p class="drawer-hint">Select a previous version to restore it to the live agent.</p>
        <div id="history-list" class="history-list">
            <div class="history-empty">Loading history...</div>
        </div>
    </div>
</div>
<div id="drawer-overlay" class="drawer-overlay"></div>

<script type="module" src="app.js"></script>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
